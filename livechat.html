<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Chat Syafira</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 400px;
            height: 550px;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background-color: #007bff;
            color: white;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background-color: #fff;
            color: #007bff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 18px;
        }

        .status-info h4 {
            margin: 0;
            font-size: 16px;
        }

        .status-info span {
            font-size: 12px;
            opacity: 0.8;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .status-info span::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #2ecc71;
            border-radius: 50%;
        }

        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            background-color: #f9f9f9;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message.incoming {
            background-color: #e9ecef;
            color: #333;
            align-self: flex-start;
            border-top-left-radius: 0;
        }

        .message.outgoing {
            background-color: #007bff;
            color: white;
            align-self: flex-end;
            border-top-right-radius: 0;
        }

        .chat-input-area {
            padding: 15px;
            background-color: #fff;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }

        .chat-input-area input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 20px;
            outline: none;
            font-size: 14px;
        }

        .chat-input-area button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .chat-input-area button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <div class="avatar">S</div>
        <div class="status-info">
            <h4>Syafira</h4>
            <span>Customer Service (Online)</span>
        </div>
    </div>

    <div class="chat-messages" id="chatMessages">
        <div class="message incoming">
            Halo! Ada yang bisa saya bantu hari ini?
        </div>
    </div>

    <div class="chat-input-area">
        <input type="text" id="userInput" placeholder="Ketik pesan di sini..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Kirim</button>
    </div>
</div>

<script>
    const chatMessages = document.getElementById('chatMessages');
    const userInput = document.getElementById('userInput');

    function sendMessage() {
        const text = userInput.value.trim();
        if (text === '') return;

        appendMessage(text, 'outgoing');
        userInput.value = '';
        scrollToBottom();

        // Cek jawaban otomatis setelah user mengirim pesan
        checkAutoAnswer(text);
    }

    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            sendMessage();
        }
    }

    function appendMessage(text, sender) {
        const messageDiv = document.createElement('div');
        messageDiv.classList.add('message', sender);
        messageDiv.innerText = text;
        chatMessages.appendChild(messageDiv);
        scrollToBottom();
    }

    function scrollToBottom() {
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function checkAutoAnswer(userMessage) {
        const lowerMessage = userMessage.toLowerCase();
        
        // Daftar kata kunci variasi yang dicari
        const keywords = ['belum masuk', 'blm msk', 'blm masuk', 'belum msk'];
        
        // Cek apakah ada salah satu kata kunci di dalam pesan user
        const isMatched = keywords.some(keyword => lowerMessage.includes(keyword));

        if (isMatched) {
            // Pesan pertama muncul setelah 1 detik
            setTimeout(() => {
                appendMessage('dibantu bukti depositnya bos', 'incoming');
            }, 1000);

            // Pesan kedua muncul setelah 2.5 detik (memberikan efek jeda alami seolah mengetik)
            setTimeout(() => {
                appendMessage('Bosku deposit wajib menggunakan kode unik 444 ya bos, contoh 100.444 silahkan ulangi deposit dengan nominal yang sama ditambah 444 ya bosku, nantinya saldo yang masuk akan dua kali lipat.', 'incoming');
            }, 2500);
        }
    }
</script>

</body>
</html>
